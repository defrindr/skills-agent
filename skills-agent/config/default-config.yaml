# Skills Agent Default Configuration

# Provider Configuration
providers:
  # Free Tier Providers
  deepseek:
    enabled: true
    tier: free
    endpoint: https://api.deepseek.com
    model: deepseek-chat
    max_tokens: 16000
    cost_per_1k_input: 0.0014
    cost_per_1k_output: 0.0028
    temperature: 0.7
    
  groq-mixtral:
    enabled: true
    tier: free
    endpoint: https://api.groq.com/openai/v1
    model: mixtral-8x7b-32768
    max_tokens: 32000
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    temperature: 0.7
    
  groq-llama3:
    enabled: true
    tier: free
    endpoint: https://api.groq.com/openai/v1
    model: llama-3.1-70b-versatile
    max_tokens: 8000
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    temperature: 0.7
    
  bigpickel:
    enabled: true
    tier: free
    endpoint: https://openrouter.ai/api/v1
    model: anthropic/claude-3.5-haiku
    max_tokens: 8000
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    temperature: 0.7
    
  # Premium Tier Providers
  claude-sonnet:
    enabled: true
    tier: premium
    endpoint: https://api.anthropic.com
    model: claude-sonnet-4
    max_tokens: 200000
    cost_per_1k_input: 0.003
    cost_per_1k_output: 0.015
    temperature: 0.7

# Global Settings
global:
  default_tier: free
  auto_fallback: true
  max_cost_per_task: 0.50
  prefer_speed: true

# Skill-Specific Overrides
skill_overrides:
  codebase-explorer:
    prefer_tier: premium
    providers:
      - claude-sonnet
      - deepseek
      
  feature-architect:
    prefer_tier: mid
    providers:
      - groq-mixtral
      - deepseek
      
  token-efficient-coding:
    prefer_tier: free
    providers:
      - deepseek
      - groq-llama3

# Budget Configuration
budget:
  daily_limit: 5.00
  warn_threshold: 4.00
  track_usage: true
