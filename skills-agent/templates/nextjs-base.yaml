name: nextjs-base
framework: nextjs
dependencies:
  required:
    next: 14.2.0
    react: 18.3.0
    react-dom: 18.3.0
  dev:
    "@types/node": "^20"
    "@types/react": "^18"
    "@types/react-dom": "^18"
    typescript: "^5"
    eslint: "^8"
    eslint-config-next: 14.2.0
    tailwindcss: "^3.4.0"
    postcss: "^8"
    autoprefixer: "^10"

structure:
  - path: app/layout.tsx
    template: nextjs-layout
  - path: app/page.tsx
    template: nextjs-home
  - path: app/globals.css
    template: nextjs-globals-css
  - path: features/.gitkeep
  - path: shared/components/.gitkeep
  - path: shared/lib/.gitkeep
  - path: shared/types/.gitkeep
  - path: public/.gitkeep

configs:
  - name: next.config.js
    template: nextjs-config
  - name: tsconfig.json
    template: nextjs-tsconfig
  - name: tailwind.config.ts
    template: nextjs-tailwind-config
  - name: postcss.config.js
    template: nextjs-postcss-config
  - name: .gitignore
    template: base-gitignore
  - name: .env.example
    template: nextjs-env
  - name: README.md
    template: nextjs-readme

scripts:
  dev: next dev
  build: next build
  start: next start
  lint: next lint
  type-check: tsc --noEmit
